<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stranger Things - Realidade Aumentada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Cinzel', serif;
            background-color: #000;
            color: #fff;
            text-align: center;
            overflow: hidden;
            /* Efeito de ruído sutil no fundo */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1000 1000' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            background-size: cover;
            opacity: 0.9;
        }

        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #logo {
            width: 90%;
            max-width: 500px;
            margin-bottom: 40px;
            /* Efeito de brilho na logo */
            filter: drop-shadow(0 0 15px #e53935) drop-shadow(0 0 25px #e53935);
        }
        
        #loading-text {
            font-size: 1.2em;
            letter-spacing: 2px;
            text-transform: uppercase;
            /* Efeito de brilho neon no texto */
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #ff0000, 0 0 20px #ff0000, 0 0 25px #ff0000, 0 0 30px #ff0000, 0 0 35px #ff0000;
            margin-bottom: 20px;
        }

        #loading-bar {
            width: 80%;
            max-width: 400px;
            height: 10px;
            border: 2px solid #ff0000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px #ff0000, 0 0 15px #ff0000;
        }

        #progress {
            width: 0%;
            height: 100%;
            background-color: #ff0000;
            box-shadow: 0 0 10px #ff0000, 0 0 15px #ff0000, 0 0 20px #ff0000;
            transition: width 0.3s ease-in-out;
        }

        #enter-button {
            display: none;
            padding: 15px 30px;
            font-family: 'Cinzel', serif;
            font-size: 1.2em;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            background-color: transparent;
            color: #fff;
            border: 2px solid #ff0000;
            border-radius: 10px;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px #fff, 0 0 10px #ff0000, 0 0 15px #ff0000;
            box-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000, inset 0 0 5px #ff0000;
        }

        #enter-button:hover {
            background-color: #ff0000;
            color: #000;
            text-shadow: none;
            box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 30px #ff0000;
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
            display: none;
        }
    </style>
    <!-- Importa o componente model-viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

    <div id="loader-container">
        <img id="logo" src="assets/img/stranger-things-logo.png" alt="Logo de Stranger Things" onerror="this.style.display='none'; document.getElementById('loading-text').innerText = 'Stranger Things AR';">
        <p id="loading-text">Entrando no Mundo Invertido...</p>
        <div id="loading-bar">
            <div id="progress"></div>
        </div>
    </div>

    <button id="enter-button">Iniciar Experiência</button>

    <model-viewer
        id="ar-viewer"
        src="assets/models/demogorgon_animated.glb"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        ar-placement="floor"
        shadow-intensity="1"
        autoplay
        alt="Um modelo 3D animado de um Demogorgon">
    </model-viewer>

    <script>
        const loaderContainer = document.getElementById('loader-container');
        const progressBar = document.getElementById('progress');
        const enterButton = document.getElementById('enter-button');
        const arViewer = document.getElementById('ar-viewer');

        // Simula o pré-carregamento de assets
        let progress = 0;
        const interval = setInterval(() => {
            progress += 10;
            progressBar.style.width = progress + '%';
            if (progress >= 100) {
                clearInterval(interval);
                // Pequeno atraso para o usuário ver a barra completa
                setTimeout(() => {
                    loaderContainer.style.display = 'none';
                    enterButton.style.display = 'block';
                }, 500);
            }
        }, 200);

        enterButton.addEventListener('click', () => {
            // Solicita permissões e ativa o modo AR ao clicar
            arViewer.style.display = 'block';
            // A ativação do AR precisa de um gesto do usuário
            arViewer.activateAR();
            enterButton.style.display = 'none';
        });

        // Adiciona um listener para quando o usuário sair do modo AR
        arViewer.addEventListener('ar-status', (event) => {
            if (!event.detail.session) {
                // Se a sessão AR terminar, mostra o botão de entrada novamente
                enterButton.style.display = 'block';
                arViewer.style.display = 'none';
            }
        });
    </script>

</body>
</html>
