<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Stranger Things AR - Caça aos Objetos</title>
    <meta name="description" content="Encontre os objetos perdidos no Mundo Invertido">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- A-Frame e AR.js -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* Telas de UI (Carregamento, Jogo, Vitória) */
        .ui-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out;
        }

        .ui-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #logo {
            width: 80%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        /* Barra de Carregamento */
        #progress-bar-container {
            width: 70%;
            max-width: 350px;
            height: 20px;
            border: 2px solid #e72626;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px; /* Espaço para o texto abaixo */
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: #e72626;
            transition: width 0.4s ease-in-out;
        }

        #loading-info {
            font-size: 0.9em;
            color: #ccc;
            height: 20px; /* Altura fixa para evitar pulos de layout */
        }

        /* Botão de Entrada */
        #enter-button {
            display: block; /* Começa visível */
            margin-top: 40px;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
            background-color: #e72626;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* UI do Jogo */
        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            z-index: 500;
            color: #fff;
            font-size: 1.1em;
            display: none; /* Começa escondido */
        }

        #game-ui h2 {
            margin: 0 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #e72626;
            font-size: 1.2em;
        }

        #collectibles-list li {
            list-style: none;
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }
        
        #collectibles-list li.found {
            text-decoration: line-through;
            color: #888;
        }

        /* Tela de Vitória */
        #victory-screen h1 {
            font-size: 2.5em;
            color: #e72626;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        #victory-screen p {
            font-size: 1.2em;
        }

    </style>
</head>

<body>
    <!-- Tela de Carregamento -->
    <div id="loading-screen" class="ui-screen">
        <img id="logo" src="assets/img/stranger-things-logo.png" alt="Stranger Things Logo">
        <p id="loading-info">Encontre os objetos perdidos no Mundo Invertido!</p>
        <button id="enter-button">Iniciar Caçada</button>
    </div>

    <!-- UI do Jogo -->
    <div id="game-ui">
        <h2>Itens para Encontrar:</h2>
        <ul id="collectibles-list">
            <li data-item="demogorgon">Demogorgon</li>
            <li data-item="will">Will Byers</li>
            <li data-item="bike">Bicicleta</li>
        </ul>
    </div>

    <!-- Tela de Vitória -->
    <div id="victory-screen" class="ui-screen hidden">
        <h1>Você Conseguiu!</h1>
        <p>Todos os itens foram encontrados.</p>
    </div>

    <!-- O contêiner da cena AR será preenchido via script -->
    <div id="ar-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadingScreen = document.getElementById('loading-screen');
            const loadingInfo = document.getElementById('loading-info');
            const enterButton = document.getElementById('enter-button');
            const gameUi = document.getElementById('game-ui');
            const victoryScreen = document.getElementById('victory-screen');
            const collectiblesList = document.getElementById('collectibles-list');

            const collectibles = {
                demogorgon: false,
                will: false,
                bike: false
            };
            const totalCollectibles = Object.keys(collectibles).length;
            let foundCollectibles = 0;

            // Lógica para o botão de entrada
            enterButton.addEventListener('click', async () => {
                loadingInfo.innerText = "Solicitando acesso à câmera...";
                enterButton.style.display = 'none';

                try {
                    // 1. Encontrar a câmera correta
                    await navigator.mediaDevices.getUserMedia({ video: true }); // Pede permissão genérica primeiro
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const videoDevices = devices.filter(device => device.kind === 'videoinput');
                    
                    let bestDevice = null;
                    for (const device of videoDevices) {
                        const label = device.label.toLowerCase();
                        if (label.includes('back') && !label.includes('telephoto')) {
                            bestDevice = device;
                            break;
                        }
                    }
                    if (!bestDevice) bestDevice = videoDevices.find(device => device.label.toLowerCase().includes('back'));
                    if (!bestDevice && videoDevices.length > 0) bestDevice = videoDevices[0];
                    if (!bestDevice) throw new Error("Nenhuma câmera encontrada.");

                    loadingInfo.innerText = "Iniciando a cena AR...";

                    // 2. Criar a cena AR dinamicamente
                    createArScene(bestDevice.deviceId);

                    // 3. Esconder a UI de carregamento e mostrar a UI do jogo
                    loadingScreen.classList.add('hidden');
                    gameUi.style.display = 'block';

                } catch (err) {
                    console.error("Erro ao iniciar AR: ", err);
                    loadingInfo.innerText = "Falha ao iniciar a câmera. Verifique as permissões e recarregue a página.";
                }
            });

            function createArScene(deviceId) {
                const arContainer = document.getElementById('ar-container');
                const sceneEl = document.createElement('a-scene');
                
                sceneEl.setAttribute('vr-mode-ui', 'enabled: false;');
                sceneEl.setAttribute('renderer', 'logarithmicDepthBuffer: true; colorManagement: true;');
                sceneEl.setAttribute('embedded', true);
                sceneEl.setAttribute('arjs', `sourceType: webcam; sourceWidth: 1280; sourceHeight: 720; trackingMethod: best; debugUIEnabled: false; deviceId: ${deviceId}`);

                // Assets
                const assetsEl = document.createElement('a-assets');
                assetsEl.innerHTML = `
                    <a-asset-item id="demogorgon-model" src="assets/models/demogorgon_animated.glb"></a-asset-item>
                    <a-asset-item id="will-model" src="assets/models/will_byers.glb"></a-asset-item>
                    <a-asset-item id="bike-model" src="assets/models/bicicleta-will.glb"></a-asset-item>
                `;
                sceneEl.appendChild(assetsEl);

                // Câmera
                const cameraEl = document.createElement('a-camera');
                cameraEl.setAttribute('fov', 60);
                cameraEl.innerHTML = '<a-cursor></a-cursor>';
                sceneEl.appendChild(cameraEl);

                // Entidades
                const demogorgonEl = document.createElement('a-entity');
                demogorgonEl.id = 'demogorgon';
                demogorgonEl.classList.add('collectible');
                demogorgonEl.setAttribute('gltf-model', '#demogorgon-model');
                demogorgonEl.setAttribute('position', '0 -1 -5');
                demogorgonEl.setAttribute('scale', '0.2 0.2 0.2');
                demogorgonEl.setAttribute('animation-mixer', 'loop: repeat');
                sceneEl.appendChild(demogorgonEl);

                const willEl = document.createElement('a-entity');
                willEl.id = 'will';
                willEl.classList.add('collectible');
                willEl.setAttribute('gltf-model', '#will-model');
                willEl.setAttribute('position', '4 0 -8');
                willEl.setAttribute('scale', '0.4 0.4 0.4');
                sceneEl.appendChild(willEl);

                const bikeEl = document.createElement('a-entity');
                bikeEl.id = 'bike';
                bikeEl.classList.add('collectible');
                bikeEl.setAttribute('gltf-model', '#bike-model');
                bikeEl.setAttribute('position', '-4 0 -10');
                bikeEl.setAttribute('scale', '0.5 0.5 0.5');
                bikeEl.setAttribute('rotation', '0 45 0');
                sceneEl.appendChild(bikeEl);

                // Adiciona a cena ao DOM e inicia o jogo
                arContainer.appendChild(sceneEl);
                initGame();
            }

            function initGame() {
                // A cena pode demorar um pouco para inicializar os nós
                setTimeout(() => {
                    const collectibleEntities = document.querySelectorAll('.collectible');
                    collectibleEntities.forEach(entity => {
                        entity.addEventListener('click', () => {
                            collectItem(entity.id);
                        });
                    });
                }, 1000); // Espera 1s para garantir que a cena está pronta
            }

            function collectItem(id) {
                if (collectibles[id]) return;
                collectibles[id] = true;
                foundCollectibles++;
                const entity = document.getElementById(id);
                if (entity) entity.setAttribute('visible', 'false');
                const listItem = collectiblesList.querySelector(`li[data-item="${id}"]`);
                if(listItem) listItem.classList.add('found');
                if (foundCollectibles >= totalCollectibles) showVictoryScreen();
            }

            function showVictoryScreen() {
                gameUi.style.display = 'none';
                victoryScreen.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
