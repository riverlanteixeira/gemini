<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Stranger Things AR - Caça aos Objetos</title>
    <meta name="description" content="Encontre os objetos perdidos no Mundo Invertido">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- A-Frame e AR.js -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* O vídeo que alimenta o AR.js fica oculto */
        #ar-video {
            position: fixed;
            top: 0; left: 0;
            width: 1px; height: 1px;
            opacity: 0;
            z-index: -1;
        }

        /* Telas de UI */
        .ui-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out;
        }

        .ui-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #logo {
            width: 80%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        #loading-info {
            font-size: 1em;
            color: #ccc;
            height: 20px;
            margin-top: 20px;
        }

        #enter-button {
            display: block;
            margin-top: 40px;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
            background-color: #e72626;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* UI do Jogo */
        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            z-index: 500;
            color: #fff;
            font-size: 1.1em;
            display: none;
        }

        #game-ui h2 {
            margin: 0 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #e72626;
            font-size: 1.2em;
        }

        #collectibles-list li {
            list-style: none;
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }
        
        #collectibles-list li.found {
            text-decoration: line-through;
            color: #888;
        }

        /* Tela de Vitória */
        #victory-screen h1 {
            font-size: 2.5em;
            color: #e72626;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        #victory-screen p {
            font-size: 1.2em;
        }

    </style>
</head>

<body>
    <!-- Elemento de vídeo para a stream da câmera -->
    <video id="ar-video" muted autoplay playsinline></video>

    <!-- Tela de Carregamento -->
    <div id="loading-screen" class="ui-screen">
        <img id="logo" src="assets/img/stranger-things-logo.png" alt="Stranger Things Logo">
        <button id="enter-button">Iniciar Caçada</button>
        <p id="loading-info"></p>
    </div>

    <!-- UI do Jogo -->
    <div id="game-ui">
        <h2>Itens para Encontrar:</h2>
        <ul id="collectibles-list">
            <li data-item="demogorgon">Demogorgon</li>
            <li data-item="will">Will Byers</li>
            <li data-item="bike">Bicicleta</li>
        </ul>
    </div>

    <!-- Tela de Vitória -->
    <div id="victory-screen" class="ui-screen hidden">
        <h1>Você Conseguiu!</h1>
        <p>Todos os itens foram encontrados.</p>
    </div>

    <!-- O contêiner da cena AR será preenchido via script -->
    <div id="ar-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadingScreen = document.getElementById('loading-screen');
            const loadingInfo = document.getElementById('loading-info');
            const enterButton = document.getElementById('enter-button');
            const gameUi = document.getElementById('game-ui');
            const victoryScreen = document.getElementById('victory-screen');
            const collectiblesList = document.getElementById('collectibles-list');
            const video = document.getElementById('ar-video');

            const collectibles = { demogorgon: false, will: false, bike: false };
            let foundCollectibles = 0;

            enterButton.addEventListener('click', () => {
                initializeAr();
            });

            async function initializeAr() {
                loadingInfo.innerText = "Solicitando acesso à câmera...";
                enterButton.style.display = 'none';

                try {
                    // 1. Encontrar o deviceId da câmera ideal
                    await navigator.mediaDevices.getUserMedia({ video: true }); // Pede permissão
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const videoDevices = devices.filter(device => device.kind === 'videoinput');
                    
                    let bestDevice = null;
                    for (const device of videoDevices) {
                        const label = device.label.toLowerCase();
                        if (label.includes('back') && !label.includes('telephoto')) {
                            bestDevice = device;
                            break;
                        }
                    }
                    if (!bestDevice) bestDevice = videoDevices.find(device => device.label.toLowerCase().includes('back'));
                    if (!bestDevice && videoDevices.length > 0) bestDevice = videoDevices[0];
                    if (!bestDevice) throw new Error("Nenhuma câmera traseira encontrada.");

                    // 2. Obter a stream da câmera manualmente
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { 
                            deviceId: { exact: bestDevice.deviceId },
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        }
                    });
                    video.srcObject = stream;

                    // 3. Esperar o vídeo começar a tocar
                    video.addEventListener('loadedmetadata', () => {
                        video.play();
                        loadingInfo.innerText = "Iniciando a cena AR...";
                        
                        // 4. Criar a cena AR somente agora
                        createArScene();
                        
                        loadingScreen.classList.add('hidden');
                        gameUi.style.display = 'block';
                    });

                } catch (err) {
                    console.error("Erro ao iniciar AR: ", err);
                    loadingInfo.innerText = `Falha ao iniciar a câmera: ${err.name}. Verifique as permissões.`;
                    enterButton.style.display = 'block';
                }
            }

            function createArScene() {
                const arContainer = document.getElementById('ar-container');
                const sceneEl = document.createElement('a-scene');
                
                sceneEl.setAttribute('vr-mode-ui', 'enabled: false;');
                sceneEl.setAttribute('renderer', 'logarithmicDepthBuffer: true; colorManagement: true;');
                sceneEl.setAttribute('embedded', true);
                // A fonte agora é o nosso elemento de vídeo
                sceneEl.setAttribute('arjs', 'sourceType: video; sourceElement: #ar-video; trackingMethod: best; debugUIEnabled: false;');

                const assetsEl = document.createElement('a-assets');
                assetsEl.innerHTML = `
                    <a-asset-item id="demogorgon-model" src="assets/models/demogorgon_animated.glb"></a-asset-item>
                    <a-asset-item id="will-model" src="assets/models/will_byers.glb"></a-asset-item>
                    <a-asset-item id="bike-model" src="assets/models/bicicleta-will.glb"></a-asset-item>
                `;
                sceneEl.appendChild(assetsEl);

                const cameraEl = document.createElement('a-camera');
                cameraEl.setAttribute('fov', 60);
                cameraEl.innerHTML = '<a-cursor></a-cursor>';
                sceneEl.appendChild(cameraEl);

                // Adiciona as entidades...
                addCollectiblesToScene(sceneEl);

                arContainer.appendChild(sceneEl);
                initGame();
            }

            function addCollectiblesToScene(sceneEl) {
                const entities = [
                    { id: 'demogorgon', model: '#demogorgon-model', pos: '0 -1 -5', scale: '0.2 0.2 0.2', anim: 'loop: repeat' },
                    { id: 'will', model: '#will-model', pos: '4 0 -8', scale: '0.4 0.4 0.4' },
                    { id: 'bike', model: '#bike-model', pos: '-4 0 -10', scale: '0.5 0.5 0.5', rot: '0 45 0' }
                ];

                entities.forEach(data => {
                    const el = document.createElement('a-entity');
                    el.id = data.id;
                    el.classList.add('collectible');
                    el.setAttribute('gltf-model', data.model);
                    el.setAttribute('position', data.pos);
                    el.setAttribute('scale', data.scale);
                    if (data.rot) el.setAttribute('rotation', data.rot);
                    if (data.anim) el.setAttribute('animation-mixer', data.anim);
                    sceneEl.appendChild(el);
                });
            }

            function initGame() {
                setTimeout(() => {
                    const collectibleEntities = document.querySelectorAll('.collectible');
                    collectibleEntities.forEach(entity => {
                        entity.addEventListener('click', () => collectItem(entity.id));
                    });
                }, 1500); // Aumenta o tempo para garantir que tudo esteja pronto
            }

            function collectItem(id) {
                if (collectibles[id]) return;
                collectibles[id] = true;
                foundCollectibles++;
                const entity = document.getElementById(id);
                if (entity) entity.setAttribute('visible', 'false');
                const listItem = collectiblesList.querySelector(`li[data-item="${id}"]`);
                if(listItem) listItem.classList.add('found');
                if (foundCollectibles >= totalCollectibles) showVictoryScreen();
            }

            function showVictoryScreen() {
                gameUi.style.display = 'none';
                victoryScreen.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
