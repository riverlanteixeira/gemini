<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realidade Aumentada - Demogorgon</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #111; color: white; text-align: center; }
        #loader-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #111;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }
        #loading-bar {
            width: 80%; max-width: 400px; height: 20px;
            border: 1px solid #fff; border-radius: 10px;
            overflow: hidden;
        }
        #progress {
            width: 0%; height: 100%;
            background-color: #0f0;
            transition: width 0.3s;
        }
        #enter-button {
            display: none; padding: 15px 30px;
            font-size: 1.2em; cursor: pointer;
            background-color: #0f0; color: #111;
            border: none; border-radius: 10px;
        }
        model-viewer {
            width: 100vw; height: 100vh;
            display: none;
        }
    </style>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

    <div id="loader-container">
        <p>Carregando experiência de RA...</p>
        <div id="loading-bar">
            <div id="progress"></div>
        </div>
    </div>

    <button id="enter-button">Entrar na Realidade Aumentada</button>

    <model-viewer
        id="ar-viewer"
        src="assets/models/demogorgon_animated.glb"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        ar-placement="floor"
        shadow-intensity="1"
        autoplay
        alt="Um modelo 3D animado de um Demogorgon">
    </model-viewer>

    <script>
        const loaderContainer = document.getElementById('loader-container');
        const progressBar = document.getElementById('progress');
        const enterButton = document.getElementById('enter-button');
        const arViewer = document.getElementById('ar-viewer');

        // Simula o pré-carregamento de assets
        let progress = 0;
        const interval = setInterval(() => {
            progress += 10;
            progressBar.style.width = progress + '%';
            if (progress >= 100) {
                clearInterval(interval);
                loaderContainer.style.display = 'none';
                enterButton.style.display = 'block';
            }
        }, 200);

        enterButton.addEventListener('click', () => {
            // Solicita permissões e ativa o modo AR ao clicar
            arViewer.style.display = 'block';
            arViewer.activateAR();
            enterButton.style.display = 'none';
        });
    </script>

</body>
</html>
