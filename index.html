<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Stranger Things AR - Caça aos Objetos</title>
    <meta name="description" content="Encontre os objetos perdidos no Mundo Invertido">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- A-Frame e AR.js -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        /* Esconde o vídeo que usaremos para a stream da câmera */
        #ar-video {
            display: none;
        }

        /* Telas de UI (Carregamento, Jogo, Vitória) */
        .ui-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out;
        }

        .ui-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #logo {
            width: 80%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        /* Barra de Carregamento */
        #progress-bar-container {
            width: 70%;
            max-width: 350px;
            height: 20px;
            border: 2px solid #e72626;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px; /* Espaço para o texto abaixo */
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: #e72626;
            transition: width 0.4s ease-in-out;
        }

        #loading-info {
            font-size: 0.9em;
            color: #ccc;
            height: 20px; /* Altura fixa para evitar pulos de layout */
        }

        /* Botão de Entrada */
        #enter-button {
            display: none; /* Começa escondido */
            margin-top: 40px;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
            background-color: #e72626;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* UI do Jogo */
        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            z-index: 500;
            color: #fff;
            font-size: 1.1em;
            display: none; /* Começa escondido */
        }

        #game-ui h2 {
            margin: 0 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #e72626;
            font-size: 1.2em;
        }

        #collectibles-list li {
            list-style: none;
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }
        
        #collectibles-list li.found {
            text-decoration: line-through;
            color: #888;
        }

        /* Tela de Vitória */
        #victory-screen h1 {
            font-size: 2.5em;
            color: #e72626;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        #victory-screen p {
            font-size: 1.2em;
        }

    </style>
</head>

<body>
    <!-- Elemento de vídeo para receber a stream da câmera correta -->
    <video id="ar-video" playsinline webkit-playsinline muted autoplay></video>

    <!-- Tela de Carregamento -->
    <div id="loading-screen" class="ui-screen">
        <img id="logo" src="assets/img/stranger-things-logo.png" alt="Stranger Things Logo">
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
        <p id="loading-info">Preparando o Mundo Invertido...</p>
        <button id="enter-button">Iniciar Caçada</button>
    </div>

    <!-- UI do Jogo -->
    <div id="game-ui">
        <h2>Itens para Encontrar:</h2>
        <ul id="collectibles-list">
            <li data-item="demogorgon">Demogorgon</li>
            <li data-item="will">Will Byers</li>
            <li data-item="bike">Bicicleta</li>
        </ul>
    </div>

    <!-- Tela de Vitória -->
    <div id="victory-screen" class="ui-screen hidden">
        <h1>Você Conseguiu!</h1>
        <p>Todos os itens foram encontrados.</p>
    </div>

    <!-- Cena de Realidade Aumentada -->
    <a-scene
        id="ar-scene"
        vr-mode-ui="enabled: false;"
        renderer="logarithmicDepthBuffer: true; colorManagement: true;"
        embedded
        style="visibility: hidden;"
        arjs="trackingMethod: best; debugUIEnabled: false; sourceType: video; sourceElement: #ar-video;"
    >
        <!-- Assets a serem pré-carregados -->
        <a-assets>
            <a-asset-item id="demogorgon-model" src="assets/models/demogorgon_animated.glb"></a-asset-item>
            <a-asset-item id="will-model" src="assets/models/will_byers.glb"></a-asset-item>
            <a-asset-item id="bike-model" src="assets/models/bicicleta-will.glb"></a-asset-item>
        </a-assets>

        <!-- Câmera AR -->
        <a-camera fov="60">
            <a-cursor></a-cursor>
        </a-camera>

        <!-- Entidades Colecionáveis -->
        <a-entity id="demogorgon" class="collectible" gltf-model="#demogorgon-model" position="0 -1 -5" scale="0.2 0.2 0.2" animation-mixer="loop: repeat"></a-entity>
        <a-entity id="will" class="collectible" gltf-model="#will-model" position="4 0 -8" scale="0.4 0.4 0.4"></a-entity>
        <a-entity id="bike" class="collectible" gltf-model="#bike-model" position="-4 0 -10" scale="0.5 0.5 0.5" rotation="0 45 0"></a-entity>

    </a-scene>

    <script>
        // Função para forçar a seleção da câmera principal (não-teleobjetiva)
        async function setupArCamera() {
            const video = document.getElementById('ar-video');
            let stream;

            try {
                // Pede acesso genérico primeiro para obter permissão
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });

                // Enumera os dispositivos para encontrar a câmera ideal
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                let bestDevice = null;
                // Procura por uma câmera traseira que NÃO seja teleobjetiva
                for (const device of videoDevices) {
                    if (device.label.toLowerCase().includes('back') && !device.label.toLowerCase().includes('telephoto')) {
                        bestDevice = device;
                        break;
                    }
                }

                // Se não achou uma "não-teleobjetiva", tenta pegar a primeira traseira
                if (!bestDevice) {
                    bestDevice = videoDevices.find(device => device.label.toLowerCase().includes('back'));
                }

                // Se encontrou uma câmera melhor, troca a stream
                if (bestDevice) {
                    stream.getTracks().forEach(track => track.stop()); // Para a stream antiga
                    stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: bestDevice.deviceId } } });
                }

                video.srcObject = stream;
                video.play();

            } catch (err) {
                console.error("Erro ao acessar a câmera: ", err);
                alert("Não foi possível acessar a câmera. Verifique as permissões do navegador.");
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const sceneEl = document.getElementById('ar-scene');
            const loadingScreen = document.getElementById('loading-screen');
            const progressBar = document.getElementById('progress-bar');
            const loadingInfo = document.getElementById('loading-info');
            const enterButton = document.getElementById('enter-button');
            const gameUi = document.getElementById('game-ui');
            const victoryScreen = document.getElementById('victory-screen');
            const collectiblesList = document.getElementById('collectibles-list');

            const collectibles = {
                demogorgon: false,
                will: false,
                bike: false
            };
            const totalCollectibles = Object.keys(collectibles).length;
            let foundCollectibles = 0;

            // --- Lógica de Carregamento Simulado ---
            const assetsToLoad = [
                { name: "demogorgon_animated.glb", progress: 30 },
                { name: "will_byers.glb", progress: 60 },
                { name: "bicicleta-will.glb", progress: 90 },
                { name: "Iniciando câmera...", progress: 100 }
            ];
            let currentAssetIndex = 0;

            function simulateLoading() {
                if (currentAssetIndex < assetsToLoad.length) {
                    const asset = assetsToLoad[currentAssetIndex];
                    loadingInfo.innerText = `Carregando: ${asset.name}`;
                    progressBar.style.width = asset.progress + '%';
                    currentAssetIndex++;
                    setTimeout(simulateLoading, 500);
                }
            }
            simulateLoading();

            // Inicia a câmera ANTES de mostrar o botão de entrar
            await setupArCamera();

            sceneEl.addEventListener('loaded', () => {
                loadingInfo.innerText = "Tudo pronto!";
                progressBar.style.width = '100%';
                setTimeout(() => {
                    document.getElementById('progress-bar-container').style.display = 'none';
                    loadingInfo.style.display = 'none';
                    enterButton.style.display = 'block';
                }, 500);
            });
            
            enterButton.addEventListener('click', () => {
                loadingScreen.classList.add('hidden');
                sceneEl.style.visibility = 'visible';
                gameUi.style.display = 'block';
                initGame();
            });

            function initGame() {
                const collectibleEntities = document.querySelectorAll('.collectible');
                collectibleEntities.forEach(entity => {
                    entity.addEventListener('click', () => {
                        collectItem(entity.id);
                    });
                });
            }

            function collectItem(id) {
                if (collectibles[id]) return;
                collectibles[id] = true;
                foundCollectibles++;
                const entity = document.getElementById(id);
                entity.setAttribute('visible', 'false');
                const listItem = collectiblesList.querySelector(`li[data-item="${id}"]`);
                if(listItem) listItem.classList.add('found');
                if (foundCollectibles >= totalCollectibles) showVictoryScreen();
            }

            function showVictoryScreen() {
                gameUi.style.display = 'none';
                victoryScreen.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
