<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Stranger Things AR - Caça aos Objetos</title>
    <meta name="description" content="Encontre os objetos perdidos no Mundo Invertido">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- A-Frame e AR.js -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* O vídeo que alimenta o AR.js fica fora da tela */
        #ar-video {
            position: fixed;
            top: -9999px; left: -9999px;
            z-index: -1;
        }

        /* Telas de UI */
        .ui-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out;
        }

        .ui-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #logo {
            width: 80%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        #loading-info {
            font-size: 1em;
            color: #ccc;
            height: 20px;
            margin-top: 20px;
            text-align: center;
        }

        #enter-button {
            display: block;
            margin-top: 40px;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
            background-color: #e72626;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* UI do Jogo */
        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            z-index: 500;
            color: #fff;
            font-size: 1.1em;
            display: none;
        }

        #game-ui h2 {
            margin: 0 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #e72626;
            font-size: 1.2em;
        }

        #collectibles-list li {
            list-style: none;
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }
        
        #collectibles-list li.found {
            text-decoration: line-through;
            color: #888;
        }

        /* Tela de Vitória */
        #victory-screen h1 {
            font-size: 2.5em;
            color: #e72626;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        #victory-screen p {
            font-size: 1.2em;
        }

    </style>
</head>

<body>
    <!-- Elemento de vídeo para a stream da câmera -->
    <video id="ar-video" muted autoplay playsinline></video>

    <!-- Tela de Carregamento -->
    <div id="loading-screen" class="ui-screen">
        <img id="logo" src="assets/img/stranger-things-logo.png" alt="Stranger Things Logo">
        <button id="enter-button">Iniciar Caçada</button>
        <p id="loading-info"></p>
    </div>

    <!-- UI do Jogo -->
    <div id="game-ui">
        <h2>Itens para Encontrar:</h2>
        <ul id="collectibles-list">
            <li data-item="demogorgon">Demogorgon</li>
            <li data-item="will">Will Byers</li>
            <li data-item="bike">Bicicleta</li>
        </ul>
    </div>

    <!-- Tela de Vitória -->
    <div id="victory-screen" class="ui-screen hidden">
        <h1>Você Conseguiu!</h1>
        <p>Todos os itens foram encontrados.</p>
    </div>

    <!-- Cena AR (inicialmente vazia e invisível) -->
    <a-scene
        id="ar-scene"
        vr-mode-ui="enabled: false;"
        renderer="logarithmicDepthBuffer: true; colorManagement: true;"
        embedded
        style="visibility: hidden;"
    >
        <!-- Assets -->
        <a-assets>
            <a-asset-item id="demogorgon-model" src="assets/models/demogorgon_animated.glb"></a-asset-item>
            <a-asset-item id="will-model" src="assets/models/will_byers.glb"></a-asset-item>
            <a-asset-item id="bike-model" src="assets/models/bicicleta-will.glb"></a-asset-item>
        </a-assets>

        <!-- Câmera será configurada via JS -->
        <a-camera fov="80"></a-camera>

        <!-- Entidades Colecionáveis -->
        <a-entity id="demogorgon" class="collectible" gltf-model="#demogorgon-model" position="0 -1 -5" scale="0.2 0.2 0.2" animation-mixer="loop: repeat"></a-entity>
        <a-entity id="will" class="collectible" gltf-model="#will-model" position="2.5 0 -8" scale="0.4 0.4 0.4"></a-entity>
        <a-entity id="bike" class="collectible" gltf-model="#bike-model" position="-2.5 0 -7" scale="0.5 0.5 0.5" rotation="0 45 0"></a-entity>

    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sceneEl = document.getElementById('ar-scene');
            const loadingScreen = document.getElementById('loading-screen');
            const enterButton = document.getElementById('enter-button');
            const loadingInfo = document.getElementById('loading-info');
            const gameUi = document.getElementById('game-ui');
            const victoryScreen = document.getElementById('victory-screen');
            const video = document.getElementById('ar-video');

            const collectibles = { demogorgon: false, will: false, bike: false };
            let foundCollectibles = 0;

            enterButton.addEventListener('click', () => {
                startAr();
            });

            async function startAr() {
                loadingInfo.innerText = "Solicitando acesso à câmera...";
                enterButton.style.display = 'none';

                try {
                    // 1. Obter a stream da câmera com as configurações mais genéricas
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment' }
                    });
                    video.srcObject = stream;

                    // 2. Esperar o vídeo começar a tocar
                    video.addEventListener('playing', () => {
                        loadingInfo.innerText = "Iniciando AR...";

                        // 3. Iniciar o AR.js com o vídeo como fonte e em modo retrato
                        sceneEl.setAttribute('arjs', {
                            sourceType: 'video',
                            sourceElement: '#ar-video',
                            displayMode: 'portrait',
                            trackingMethod: 'best',
                            debugUIEnabled: false
                        });

                        // Adiciona o cursor à câmera
                        const camera = sceneEl.querySelector('a-camera');
                        const cursor = document.createElement('a-cursor');
                        camera.appendChild(cursor);

                        // 4. Mostrar a cena e a UI do jogo
                        loadingScreen.classList.add('hidden');
                        sceneEl.style.visibility = 'visible';
                        gameUi.style.display = 'block';
                        initGame();
                    });

                } catch (err) {
                    console.error("Erro ao iniciar a câmera: ", err);
                    loadingInfo.innerText = `Erro: ${err.name}. Verifique as permissões da câmera e recarregue.`;
                    enterButton.style.display = 'block';
                }
            }

            function initGame() {
                const collectibleEntities = document.querySelectorAll('.collectible');
                collectibleEntities.forEach(entity => {
                    entity.addEventListener('click', () => collectItem(entity.id));
                });
            }

            function collectItem(id) {
                if (collectibles[id]) return;
                collectibles[id] = true;
                foundCollectibles++;
                const entity = document.getElementById(id);
                if (entity) entity.setAttribute('visible', 'false');
                const listItem = collectiblesList.querySelector(`li[data-item="${id}"]`);
                if(listItem) listItem.classList.add('found');
                if (foundCollectibles >= totalCollectibles) showVictoryScreen();
            }

            function showVictoryScreen() {
                gameUi.style.display = 'none';
                victoryScreen.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
